openapi: 3.2.0
info:
  title: AutoCare
  description: API documentation about AutoCare
  version: 1.0.0
tags:
- name: RepairTicket
  summary: Managing RepairTickets
  description: Everything about RepairTickets
- name: Repair
  summary: Managing repairs
  description: Everything about repairs
- name: User
  summary: Managing user acounts
  description: "login, register and CRUD with user"
- name: Vehicle
  summary: Managing vehicles
  description: Everything about vehicles
paths:
  /repairs:
    get:
      tags:
      - Repair
      summary: Search repairs
      description: "Returns a filtered, sorted and paginated list of repairs."
      parameters:
      - name: vehicleMake
        in: query
        schema:
          type: string
      - name: vehicleModel
        in: query
        schema:
          type: string
      - name: description
        in: query
        schema:
          type: string
      - name: sortProperty
        in: query
        schema:
          type: string
      - name: sortAscending
        in: query
        schema:
          type: boolean
          default: true
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          minimum: 1
          default: 20
      responses:
        "200":
          description: Repairs list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    description: List of repairs matching the filter
                    items:
                      type: object
                      description: Represents a repair made on a vehicle.
                      allOf:
                      - type: object
                        properties:
                          id:
                            type: integer
                            format: int64
                      - type: object
                        required:
                        - vehicleId
                        - description
                        - costOfRepair
                        - laborCost
                        - isCompleted
                        - repairTicketId
                        properties:
                          vehicleId:
                            type: integer
                          description:
                            type: string
                            maxLength: 500
                          costOfRepair:
                            type: number
                            format: decimal
                            minimum: 0
                          laborCost:
                            type: number
                            format: decimal
                            minimum: 0
                          isCompleted:
                            type: boolean
                          repairTicketId:
                            type: integer
                  filterInfo:
                    description: Request model for retrieving repairs with filters.
                    allOf:
                    - type: object
                      description: "Base filtering, sorting and paging model."
                      properties:
                        pager:
                          type: object
                          description: Pagination information.
                          required:
                          - page
                          - pageSize
                          properties:
                            page:
                              type: integer
                              minimum: 1
                            pageSize:
                              type: integer
                              minimum: 1
                              maximum: 100
                        sortProperty:
                          type: string
                          description: Property name used for sorting.
                        sortAscending:
                          type: boolean
                          description: Defines sorting direction.
                          default: true
                    - type: object
                      properties:
                        filter:
                          type: object
                          description: Filtering options for repairs.
                          properties:
                            vehicleMake:
                              type: string
                            vehicleModel:
                              type: string
                            description:
                              type: string
    post:
      tags:
      - Repair
      summary: Create repair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Represents a repair made on a vehicle.
              allOf:
              - type: object
                properties:
                  id:
                    type: integer
                    format: int64
              - type: object
                required:
                - vehicleId
                - description
                - costOfRepair
                - laborCost
                - isCompleted
                - repairTicketId
                properties:
                  vehicleId:
                    type: integer
                  description:
                    type: string
                    maxLength: 500
                  costOfRepair:
                    type: number
                    format: decimal
                    minimum: 0
                  laborCost:
                    type: number
                    format: decimal
                    minimum: 0
                  isCompleted:
                    type: boolean
                  repairTicketId:
                    type: integer
      responses:
        "200":
          description: Created repair
          content:
            application/json:
              schema:
                type: object
                description: Represents a repair made on a vehicle.
                allOf:
                - type: object
                  properties:
                    id:
                      type: integer
                      format: int64
                - type: object
                  required:
                  - vehicleId
                  - description
                  - costOfRepair
                  - laborCost
                  - isCompleted
                  - repairTicketId
                  properties:
                    vehicleId:
                      type: integer
                    description:
                      type: string
                      maxLength: 500
                    costOfRepair:
                      type: number
                      format: decimal
                      minimum: 0
                    laborCost:
                      type: number
                      format: decimal
                      minimum: 0
                    isCompleted:
                      type: boolean
                    repairTicketId:
                      type: integer
